<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OperantX Terminal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="robots" content="noindex">
<link rel="icon" href="./favicon.ico">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./favicon.ico">
<style>
  html, body {
    margin: 0; height: 100%; height: 100dvh;
    background: #16161e; overflow: hidden; overscroll-behavior: none;
  }
  #term, #overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    padding: 6px; box-sizing: border-box;
  }
  #overlay {
    display: flex; align-items: center; justify-content: center;
    background: #16161e; color: #7aa2f7; font: 14px ui-monospace, monospace;
    transition: opacity .25s; z-index: 10;
  }
  #overlay.gone { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="term"></div>
<div id="overlay">Booting...</div>
<script src="./vm/libv86.js"></script>
<script type="module">
import { init, Terminal, FitAddon } from "./terminal/ghostty-web.js";

const CMDLINE =
    "rw root=host9p rootfstype=9p rootflags=trans=virtio,cache=loose " +
    "modules=virtio_pci tsc=reliable init_on_free=on";

await init();

const term = new Terminal({
    fontSize: 14,
    fontFamily: "ui-monospace, monospace",
    cursorBlink: true,
    theme: { background: "#16161e", foreground: "#c0caf5", cursor: "#c0caf5" },
});
const termEl = document.getElementById("term");
const overlayEl = document.getElementById("overlay");
const fit = new FitAddon();
term.loadAddon(fit);
function keyboardObscuring() {
    const vv = window.visualViewport;
    if (!vv) return false;
    return vv.height < window.innerHeight - 80 || vv.width < window.innerWidth - 80;
}

function layoutViewport() {
    const vv = window.visualViewport;
    const shrunk = keyboardObscuring();

    for (const el of [termEl, overlayEl]) {
        if (shrunk && vv) {
            el.style.top = `${vv.offsetTop}px`;
            el.style.left = `${vv.offsetLeft}px`;
            el.style.width = `${vv.width}px`;
            el.style.height = `${vv.height}px`;
        } else {
            el.style.top = el.style.left = el.style.width = el.style.height = "";
        }
    }
    fit.fit();
}

let resizeTimer;
function onViewportChange() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(layoutViewport, 100);
}

term.open(termEl);
fit.observeResize();
layoutViewport();

const res = await fetch("./vm/alpine-state.bin.gz");
const state = await new Response(res.body.pipeThrough(new DecompressionStream("gzip"))).arrayBuffer();

const emulator = new V86({
    wasm_path: "./vm/v86.wasm",
    bios: { url: "./vm/bios/seabios.bin" },
    vga_bios: { url: "./vm/bios/vgabios.bin" },
    autostart: true,
    memory_size: 128 * 1024 * 1024,
    vga_memory_size: 4 * 1024 * 1024,
    bzimage_initrd_from_filesystem: true,
    cmdline: CMDLINE,
    uart1: true,
    filesystem: {},
    net_device: { type: "virtio", relay_url: "fetch", dns_method: "doh" },
    initial_state: { url: URL.createObjectURL(new Blob([state])) },
});

const decoder = new TextDecoder();
let queue = [];
let scheduled = false;
emulator.add_listener("serial0-output-byte", (byte) => {
    queue.push(byte);
    if (!scheduled) {
        scheduled = true;
        requestAnimationFrame(() => {
            scheduled = false;
            const bytes = new Uint8Array(queue);
            queue = [];
            term.write(decoder.decode(bytes, { stream: true }));
        });
    }
});
const encoder = new TextEncoder();
term.onData((data) => emulator.serial_send_bytes(0, encoder.encode(data)));

function send_size(cols, rows) {
    emulator.serial_send_bytes(1, encoder.encode(`${cols} ${rows}\n`));
}
term.onResize(({ cols, rows }) => send_size(cols, rows));

window.addEventListener("resize", onViewportChange);
window.visualViewport?.addEventListener("resize", onViewportChange);
window.visualViewport?.addEventListener("scroll", onViewportChange);
termEl.addEventListener("focusin", () => {
    setTimeout(layoutViewport, 300);
    setTimeout(layoutViewport, 600);
}, true);

let ready = false;
function ready_once() {
    if (ready) return;
    ready = true;
    setTimeout(() => {
        send_size(term.cols, term.rows);
        emulator.serial_send_bytes(0, encoder.encode(
            "HISTSIZE=0; set +o history; clear; sysinfo; " +
            "set -o history; unset HISTSIZE; export HISTFILE=$HOME/.bash_history\n"));
        document.getElementById("overlay").classList.add("gone");
        term.focus();
    }, 300);
}

emulator.add_listener("emulator-ready", () => emulator.serial_set_carrier_detect(1, true));
emulator.add_listener("emulator-ready", ready_once);
setTimeout(ready_once, 2500);
</script>
</body>
</html>
